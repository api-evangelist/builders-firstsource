aid: builders-firstsource
name: Builders FirstSource
description: >-
  Builders FirstSource (NYSE: BLDR) is the nation's largest supplier and
  manufacturer of structural building products, value-added components, and
  construction services to the professional market for single-family and
  multi-family construction. The company operates approximately 570 locations
  across 43 states with 28,000 team members, headquartered in Irving, Texas.
  Its product portfolio includes lumber, manufactured components, doors,
  windows, millwork, cabinets, and roofing, complemented by digital procurement
  and project management tools through the myBLDR platform.
